services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docassistant-postgres
    environment:
      POSTGRES_DB: docassistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - docassistant-pgdata:/var/lib/postgresql/data

volumes:
  docassistant-pgdata: